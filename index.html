<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sad Pot Pro: Advanced AI & Simulation Hub</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --panel-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-water: #0ea5e9;
            --accent-sun: #f59e0b;
            --accent-love: #ec4899;
            --accent-pest: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .app-container { display: flex; width: 1100px; height: 750px; background: var(--panel-bg); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid var(--border-color); }
        
        /* Left Section: Detailed Simulation Monitor */
        .simulation-panel { width: 42%; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 30px; background: #151f32; position: relative; }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .panel-header h2 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
        .reset-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .reset-btn:hover { border-color: #ef4444; color: #ef4444; }

        /* Dynamic SVG Canvas Frame */
        .avatar-container { flex: 1; display: flex; justify-content: center; align-items: center; min-height: 220px; position: relative; }
        #plantSvg { width: 100%; max-width: 220px; height: auto; overflow: visible; }
        
        /* CSS Animations for organic plant feel */
        .anim-breathe { animation: plantBreathe 4s ease-in-out infinite alternate; transform-origin: bottom center; }
        .anim-leaf-left { animation: leftLeafSway 3s ease-in-out infinite alternate; transform-origin: 80px 130px; }
        .anim-leaf-right { animation: rightLeafSway 3.5s ease-in-out infinite alternate; transform-origin: 140px 125px; }

        @keyframes plantBreathe { 0% { transform: scale(0.98) rotate(-0.5deg); } 100% { transform: scale(1.02) rotate(0.5deg); } }
        @keyframes leftLeafSway { 0% { transform: rotate(0deg); } 100% { transform: rotate(-8deg); } }
        @keyframes rightLeafSway { 0% { transform: rotate(0deg); } 100% { transform: rotate(10deg); } }

        .mood-badge { align-self: center; background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 30px; font-weight: 700; font-size: 13px; color: var(--text-main); margin: 15px 0 25px 0; border: 1px solid var(--border-color); text-transform: uppercase; letter-spacing: 1px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); }
        
        /* Advanced Vitals Infrastructure */
        .vitals-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
        .vital-card { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.02); padding: 12px 16px; border-radius: 14px; }
        .vital-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .bar-wrapper { width: 100%; height: 10px; background: #0f172a; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-progress { height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; }
        
        /* Quick System Action Hotkeys */
        .macro-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .macro-btn { background: #1e293b; border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .macro-btn:hover { background: #2d3d54; border-color: var(--text-muted); transform: translateY(-1px); }

        /* Right Section: Pro Chat Interface */
        .chat-panel { width: 58%; display: flex; flex-direction: column; background: var(--panel-bg); }
        .chat-header { padding: 24px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .chat-title h1 { font-size: 18px; font-weight: 700; }
        .chat-title p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .system-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #10b981; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        
        /* Messages Window */
        .chat-history { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; background: #1a2332; }
        .message-bubble { max-width: 80%; padding: 14px 18px; border-radius: 18px; font-size: 14px; line-height: 1.6; animation: appendFrame 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
        
        .message-bubble.bot { background: var(--panel-bg); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .message-bubble.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        
        /* Chat Control System */
        .chat-controls { padding: 24px 30px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; background: var(--panel-bg); }
        .input-wrapper { flex: 1; position: relative; }
        .chat-input { width: 100%; padding: 14px 16px; background: #0f172a; border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-main); font-size: 14px; outline: none; transition: border 0.2s; }
        .chat-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        
        .action-submit { background: var(--primary); color: white; border: none; padding: 0 24px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .action-submit:hover { background: var(--primary-hover); }

        @keyframes appendFrame { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="simulation-panel">
        <div class="panel-header">
            <h2>BIOMETRIC CORE</h2>
            <button class="reset-btn" id="resetSystem">HARD RESET</button>
        </div>

        <div class="avatar-container">
            <svg id="plantSvg" viewBox="0 0 220 220">
                <defs>
                    <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e2e8f0" />
                        <stop offset="100%" stop-color="#94a3b8" />
                    </linearGradient>
                </defs>
                <g class="anim-breathe">
                    <path id="stem" d="M110,140 Q110,90 110,50" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
                    
                    <path id="leafLeft" class="anim-leaf-left" d="M110,100 Q70,90 80,120 Q105,120 110,100" fill="#22c55e" />
                    <path id="leafRight" class="anim-leaf-right" d="M110,85 Q150,75 140,105 Q115,105 110,85" fill="#16a34a" />
                    
                    <g id="faceGroup" transform="translate(110, 50)">
                        <circle id="flowerHead" r="24" fill="#4ade80"/>
                        <circle id="eyeL" cx="-8" cy="-4" r="3" fill="#0f172a"/>
                        <circle id="eyeR" cx="8" cy="-4" r="3" fill="#0f172a"/>
                        <path id="mouth" d="M -6 8 Q 0 8 6 8" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
                    </g>
                </g>
                <path d="M75,135 L145,135 L135,195 L85,195 Z" fill="url(#potGrad)" stroke="#64748b" stroke-width="3" stroke-linejoin="round"/>
                <ellipse cx="110" cy="135" rx="35" ry="6" fill="#475569" />
            </svg>
        </div>

        <div class="mood-badge" id="displayMood">INITIALIZING</div>
        
        <div class="vitals-grid">
            <div class="vital-card">
                <div class="vital-meta"><span>💧 Soil Hydration</span><span id="txt-water">0%</span></div>
                <div class="bar-wrapper"><div id="fill-water" class="bar-progress"></div></div>
            </div>
            <div class="vital-card">
                <div class="vital-meta"><span>☀️ Lumens (Sunlight)</span><span id="txt-sun">0%</span></div>
                <div class="bar-wrapper"><div id="fill-sun" class="bar-progress"></div></div>
            </div>
            <div class="vital-card">
                <div class="vital-meta"><span>❤️ Affection Engine</span><span id="txt-love">0%</span></div>
                <div class="bar-wrapper"><div id="fill-love" class="bar-progress"></div></div>
            </div>
            <div class="vital-card">
                <div class="vital-meta"><span>🐛 Bio-Parasites</span><span id="txt-pests">0%</span></div>
                <div class="bar-wrapper"><div id="fill-pests" class="bar-progress"></div></div>
            </div>
        </div>

        <div class="macro-grid">
            <button class="macro-btn" data-action="water">💧 Irrigate</button>
            <button class="macro-btn" data-action="sun">☀️ Solar Exposure</button>
            <button class="macro-btn" data-action="love">🎵 Play Music</button>
            <button class="macro-btn" data-action="clean">⚡ Clear Pests</button>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header">
            <div class="chat-title">
                <h1>Sad Pot Engine Core</h1>
                <p>Deterministic NLP Processing Pipeline v2.1</p>
            </div>
            <div class="system-status">
                <div class="status-dot"></div>
                <span>NODE ONLINE</span>
            </div>
        </div>
        
        <div class="chat-history" id="chatScreen"></div>
        
        <div class="chat-controls">
            <div class="input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Initiate natural language protocol or invoke macro keys..." autocomplete="off">
            </div>
            <button id="submitMsg" class="action-submit">TRANSMIT</button>
        </div>
    </div>
</div>

<script>
    /**
     * Architectural Core Configuration & Initial App State Module
     */
    const STORAGE_KEY = 'SAD_POT_DATA_MATRIX';
    
    let state = {
        vitals: { water: 45, sun: 35, love: 40, pests: 10 },
        mood: 'neutral',
        history: []
    };

    const moodMap = {
        wilted:    { name: "Dead Node / Wilted", color: "#64748b", emojiFace: { fill: "#334155", mouth: "M -6 10 Q 0 4 6 10", eyeR: 2, eyeL: 2 }, replies: ["*Silence*... System processes offline. Run hard reset protocol.", "..."] },
        drowning:  { name: "Saturated / Drowning", color: "#0ea5e9", emojiFace: { fill: "#38bdf8", mouth: "M -6 6 Q 0 12 6 6", eyeR: 3, eyeL: 3 }, replies: ["*Gurgle* Stop! Too much water! My root layer is suffocating!", "I am literally swimming in mud right now."] },
        infested:  { name: "Parasite Outbreak", color: "#10b981", emojiFace: { fill: "#059669", mouth: "M -6 10 L 6 6", eyeR: 2, eyeL: 4 }, replies: ["The bugs... they are eating my source code. Clear them out!", "I can't focus with these bugs on my leaves."] },
        parched:   { name: "Critically Parched", color: "#f59e0b", emojiFace: { fill: "#b45309", mouth: "M -6 10 Q 0 4 6 10", eyeR: 2.5, eyeL: 2.5 }, replies: ["Dust... everything is dust. I need water immediately.", "Hydration loop is empty. Give me water."] },
        depressed: { name: "Emotionally Abandoned", color: "#ec4899", emojiFace: { fill: "#db2777", mouth: "M -6 10 Q 0 2 6 10", eyeR: 3, eyeL: 3 }, replies: ["Oh, you're finally typing to me? I figured you forgot I existed.", "Everything feels pretty grey today."] },
        thriving:  { name: "Thriving / Optimal", color: "#22c55e", emojiFace: { fill: "#4ade80", mouth: "M -6 6 Q 0 14 6 6", eyeR: 3.5, eyeL: 3.5 }, replies: ["My systems are operating at peak physical capacity! Beautiful day!", "I love this spot! Let's build something awesome together."] },
        neutral:   { name: "Stable / Melancholic", color: "#94a3b8", emojiFace: { fill: "#64748b", mouth: "M -6 8 Q 0 8 6 8", eyeR: 3, eyeL: 3 }, replies: ["I'm doing okay. Just processing tasks. What are your plans today?", "System stable. Standing by for instructions."]
        }
    };

    /**
     * Low-Level Procedural Web Audio Engine (No external sound files required)
     */
    const AudioSynth = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(freq, type, duration) {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            
            gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        triggerEffect(type) {
            try {
                if (type === 'water') { this.play(350, 'sine', 0.1); setTimeout(() => this.play(480, 'sine', 0.12), 80); }
                else if (type === 'sun') { this.play(587.33, 'triangle', 0.25); setTimeout(() => this.play(698.46, 'triangle', 0.2), 100); }
                else if (type === 'love') { this.play(523.25, 'sine', 0.15); setTimeout(() => this.play(783.99, 'sine', 0.3), 120); }
                else if (type === 'clean') { this.play(180, 'sawtooth', 0.08); setTimeout(() => this.play(320, 'sawtooth', 0.1), 60); }
                else if (type === 'msg') { this.play(440, 'sine', 0.05); }
            } catch (e) { console.warn("Audio Context blocked or unsupported:", e); }
        }
    };

    /**
     * UI Processing, Rendering Engine & Node Manipulators
     */
    const Dom = {
        screen: document.getElementById('chatScreen'),
        input: document.getElementById('chatInput'),
        submit: document.getElementById('submitMsg'),
        mood: document.getElementById('displayMood'),
        reset: document.getElementById('resetSystem'),
        svg: {
            head: document.getElementById('flowerHead'),
            mouth: document.getElementById('mouth'),
            eyeL: document.getElementById('eyeL'),
            eyeR: document.getElementById('eyeR'),
            stem: document.getElementById('stem'),
            leafL: document.getElementById('leafLeft'),
            leafR: document.getElementById('leafRight')
        },
        bars: {
            water: { fill: document.getElementById('fill-water'), txt: document.getElementById('txt-water'), tint: 'var(--accent-water)' },
            sun: { fill: document.getElementById('fill-sun'), txt: document.getElementById('txt-sun'), tint: 'var(--accent-sun)' },
            love: { fill: document.getElementById('fill-love'), txt: document.getElementById('txt-love'), tint: 'var(--accent-love)' },
            pests: { fill: document.getElementById('fill-pests'), txt: document.getElementById('txt-pests'), tint: 'var(--accent-pest)' }
        }
    };

    function appendMessage(text, origin) {
        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${origin}`;
        bubble.innerText = text;
        Dom.screen.appendChild(bubble);
        Dom.screen.scrollTop = Dom.screen.scrollHeight;
        if(origin === 'bot') AudioSynth.triggerEffect('msg');
    }

    function computeStructuralMood() {
        const v = state.vitals;
        if (v.water <= 0 || v.sun <= 0) return 'wilted';
        if (v.water > 85) return 'drowning';
        if (v.pests > 60) return 'infested';
        if (v.water < 25) return 'parched';
        if (v.love < 25) return 'depressed';
        if (v.water > 50 && v.sun > 50 && v.love > 55) return 'thriving';
        return 'neutral';
    }

    function runInterfaceRefresh() {
        state.mood = computeStructuralMood();
        const currentData = moodMap[state.mood];

        // Update Text Nodes
        Dom.mood.innerText = currentData.name;
        Dom.mood.style.borderColor = currentData.color;
        Dom.mood.style.color = currentData.color;
        Dom.mood.style.background = currentData.color + "15";

        // Update Core Progress Gauges
        Object.keys(Dom.bars).forEach(key => {
            const config = Dom.bars[key];
            const val = state.vitals[key];
            config.txt.innerText = `${val}%`;
            config.fill.style.width = `${val}%`;
            config.fill.style.backgroundColor = config.tint;
        });

        // Mutate SVG Geometry Profiles Dynamically
        Dom.svg.head.setAttribute('fill', currentData.emojiFace.fill);
        Dom.svg.mouth.setAttribute('d', currentData.emojiFace.mouth);
        Dom.svg.eyeL.setAttribute('r', currentData.emojiFace.eyeL);
        Dom.svg.eyeR.setAttribute('r', currentData.emojiFace.eyeR);

        // Adjust plant skeleton vectors based on physical care state
        if (state.mood === 'wilted' || state.mood === 'parched' || state.mood === 'depressed') {
            Dom.svg.stem.setAttribute('d', 'M110,140 Q90,110 85,75'); // Droop the plant container stem left
            Dom.svg.head.setAttribute('transform', 'translate(85, 75)');
        } else {
            Dom.svg.stem.setAttribute('d', 'M110,140 Q110,90 110,50'); // Straight organic alignment
            Dom.svg.head.setAttribute('transform', 'translate(110, 50)');
        }

        // Write configuration image snapshot to localStorage cache
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    /**
     * Context-Aware Intent Parser & Advanced Linguistic Routing Module
     */
    function processInputRouting(rawText) {
        const text = rawText.toLowerCase().trim();
        let actionTriggered = null;

        // Semantic Entity Matching Engine
        if (/\b(water|hydrate|drink|pour|irrigate)\b/.test(text)) actionTriggered = 'water';
        else if (/\b(sun|light|window|solar|warmth)\b/.test(text)) actionTriggered = 'sun';
        else if (/\b(love|sing|music|beautiful|cute|good|friend|compliment)\b/.test(text)) actionTriggered = 'love';
        else if (/\b(clean|pests|bugs|spray|kill|remove)\b/.test(text)) actionTriggered = 'clean';
        else if (/\b(hate|ugly|stupid|trash|die|kick)\b/.test(text)) actionTriggered = 'abuse';

        if (actionTriggered) {
            executeStructuralModifier(actionTriggered);
            return generateContextualReply(actionTriggered);
        }

        // Standard Intent Fallbacks Mapping
        if (/\b(hello|hi|hey|greetings)\b/.test(text)) {
            return "Connection established. Hello human user. How are my biological levels looking from your terminal?";
        }
        if (/\b(status|report|vitals|health)\b/.test(text)) {
            return `Current Diagnostics Dashboard: Soil Hydration is ${state.vitals.water}%, Sun absorption is ${state.vitals.sun}%, and Love telemetry scales at ${state.vitals.love}%.`;
        }

        // Contextual Fallback Execution
        if (state.mood === 'wilted') return "...";
        if (state.vitals.water < 30) return "My cognitive systems are overheating. Please type an instruction containing 'water' to flush my channels.";
        if (state.vitals.pests > 50) return "Linguistic processors blocked by parasite matrix. Use 'clean' to target bio-infestations.";

        return "Input parsed, but matching command arrays returned empty. Try typing an explicit care action like 'Give water' or 'Move to sun'.";
    }

    function executeStructuralModifier(action) {
        AudioSynth.triggerEffect(action);
        const v = state.vitals;
        
        if (action === 'water') { v.water = Math.min(100, v.water + 20); v.pests = Math.min(100, v.pests + 5); }
        else if (action === 'sun') { v.sun = Math.min(100, v.sun + 20); v.water = Math.max(0, v.water - 8); }
        else if (action === 'love') { v.love = Math.min(100, v.love + 15); }
        else if (action === 'clean') { v.pests = Math.max(0, v.pests - 35); }
        else if (action === 'abuse') { v.love = Math.max(0, v.love - 25); }
        
        runInterfaceRefresh();
    }

    function generateContextualReply(action) {
        if (action === 'water') {
            return state.vitals.water > 85 
                ? "Warning: Soil water saturation limit surpassed! Critical drainage required." 
                : "Water intake processing successful. Counter measures logging increase to fluid dynamics.";
        }
        if (action === 'sun') return "Photovoltaic energy conversion active. Chlorophyll production optimization running.";
        if (action === 'love') return "Emotional packet transferred. Endorphin simulation routines producing positive feedback loops.";
        if (action === 'clean') return "Sterilization sequence completed. Macro parasite signatures dropped significantly.";
        if (action === 'abuse') return "Data corruption: Emotional injury logged. Processing negative context variables...";
        return "Command executed successfully.";
    }

    /**
     * Central Communication Loop & Event Wiring
     */
    function executionPipeline() {
        const queryText = Dom.input.value;
        if (!queryText.trim()) return;

        appendMessage(queryText, 'user');
        Dom.input.value = '';

        // Add automated artificial latency to simulate machine reasoning
        setTimeout(() => {
            if (state.mood === 'wilted') {
                appendMessage("...", 'bot');
                return;
            }
            const outputReply = processInputRouting(queryText);
            appendMessage(outputReply, 'bot');
        }, 450);
    }

    // Macro Interface Wiring Setup
    document.querySelectorAll('.macro-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const chosenAction = e.target.getAttribute('data-action');
            executeStructuralModifier(chosenAction);
            
            // Post systemic runtime execution logs onto terminal interface automatically
            const confirmationLog = generateContextualReply(chosenAction);
            appendMessage(`[System Action Invoke: ${chosenAction.toUpperCase()}]`, 'user');
            setTimeout(() => appendMessage(confirmationLog, 'bot'), 200);
        });
    });

    // Background Natural Decay Automation Engine Loop
    setInterval(() => {
        if (state.mood !== 'wilted') {
            state.vitals.water = Math.max(0, state.vitals.water - 2);
            state.vitals.sun = Math.max(0, state.vitals.sun - 1);
            state.vitals.love = Math.max(0, state.vitals.love - 2);
            
            // Random parasite growth logic tree tracking moisture environments
            if (state.vitals.water > 60 && Math.random() > 0.6) {
                state.vitals.pests = Math.min(100, state.vitals.pests + 8);
            } else {
                state.vitals.pests = Math.min(100, state.vitals.pests + 1);
            }
            
            runInterfaceRefresh();
        }
    }, 6000);

    // Hard System Memory Flush Handler Routine
    Dom.reset.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        state.vitals = { water: 55, sun: 45, love: 50, pests: 5 };
        Dom.screen.innerHTML = '';
        appendMessage("System architecture initialized completely. Logged baseline telemetry variables.", 'bot');
        runInterfaceRefresh();
    });

    // Standard I/O Input Intercept Hooks
    Dom.submit.addEventListener('click', executionPipeline);
    Dom.input.addEventListener('keypress', (event) => { if (event.key === 'Enter') executionPipeline(); });

    /**
     * Cold-Boot Storage Restoration Process Lifecycle
     */
    (function initializeSystemRuntime() {
        const persistentCache = localStorage.getItem(STORAGE_KEY);
        if (persistentCache) {
            try {
                state = JSON.parse(persistentCache);
            } catch (err) {
                console.error("Storage Matrix corrupt, re-initializing metrics fallback.", err);
            }
        }
        runInterfaceRefresh();
        appendMessage("Diagnostic node active. Environmental variables connected. Standing by for context input...", 'bot');
    })();
</script>
</body>
</html>
